<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>永齡學習偵探社</title>
  <link rel="stylesheet" href="hub.css">
</head>
<body>
  <main class="hub">
    <header class="hero">
      <p class="eyebrow">永齡希望小學｜共學與個別加強</p>
      <h1>學習偵探社</h1>
      <p>先選擇今天要執行的任務。國文與數學的題庫、進度及成績會分開記錄。</p>
    </header>

    <section class="subject-grid" aria-label="選擇科目">
      <a class="subject chinese" href="chinese/index.html">
        <span class="stamp">文</span>
        <span class="subject-copy">
          <small>國文任務</small>
          <strong>部件偵探社</strong>
          <span>辨認部件、推測字義、修復句子</span>
        </span>
        <span class="go">進入國文館 →</span>
      </a>

      <a class="subject math" href="math/index.html">
        <span class="stamp">數</span>
        <span class="subject-copy">
          <small>數學任務</small>
          <strong>數感偵探社</strong>
          <span>四年級共學、個別補強、策略說明</span>
        </span>
        <span class="go">進入數學館 →</span>
      </a>
    </section>

    <aside class="note">
      <strong>同學有愛：</strong>先問對方怎麼想，再給一個線索；不直接說答案。
    </aside>
  </main>
</body>
</html>
