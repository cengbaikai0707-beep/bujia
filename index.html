<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國語學院｜學習大廳</title>
  <link rel="stylesheet" href="hub.css">
</head>
<body>
  <main class="hub">
    <header class="hero">
      <p class="eyebrow">國語學院 · 學習任務中心</p>
      <h1>學習大廳</h1>
      <p>選擇今天要進行的任務。國文、數學與讀題可以單獨練習，也能進入同樂會合作破案。</p>
    </header>

    <section class="subject-grid" aria-label="選擇學習任務">
      <a class="subject chinese" href="chinese/index.html">
        <span class="stamp">文</span>
        <span class="subject-copy">
          <small>文字任務</small>
          <strong>國文偵探社</strong>
          <span>部件辨認 × 字義推理 × 考前快寫</span>
        </span>
        <span class="go">進入國文館 →</span>
      </a>

      <a class="subject math" href="math/index.html">
        <span class="stamp">數</span>
        <span class="subject-copy">
          <small>數學任務</small>
          <strong>數學偵探社</strong>
          <span>四年級共學 × 個別補強 × 教師指定</span>
        </span>
        <span class="go">進入數學館 →</span>
      </a>

      <a class="subject reading" href="reading/index.html">
        <span class="stamp">讀</span>
        <span class="subject-copy">
          <small>讀題任務</small>
          <strong>讀題偵探社</strong>
          <span>應用題審題 × 部首字義 × 字族延伸</span>
        </span>
        <span class="go">進入偵探社 →</span>
      </a>

      <a class="subject party" href="party/index.html">
        <span class="stamp">會</span>
        <span class="subject-copy">
          <small>合作任務</small>
          <strong>同樂會零食大盜</strong>
          <span>國文 × 數學 × 讀題　四線合作破案</span>
        </span>
        <span class="go">進入同樂會 →</span>
      </a>
    </section>

    <p class="note"><strong>使用提醒：</strong>各館的作答紀錄只保留在目前頁面；完成後可依各遊戲提供的按鈕匯出結果。</p>
  </main>
</body>
</html>
