<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>讀題偵探社｜應用題審題診斷</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="topbar" class="topbar hidden">
    <div><span class="seal">讀</span><strong id="bar-title">審題任務</strong></div>
    <div class="top-actions">
      <span id="bar-progress" class="tag">1 / 10</span>
      <button id="btn-quit" class="text-btn">回大廳</button>
    </div>
    <div class="rail"><div id="rail-fill"></div></div>
  </header>

  <main>
    <section id="screen-home" class="screen active">
      <div class="wrap">
        <div class="hero">
          <div class="icon-mark">🔍</div>
          <p class="eyebrow">數學應用題 ｜ 審題偵查</p>
          <h1>讀題偵探社</h1>
          <p>不是練計算，而是練「讀懂題目」。選錯時，我們從答案反推你漏看了哪個關鍵。</p>
        </div>

        <div id="daily-event" class="daily-event"></div>

        <div class="detective-home">
          <div class="dh-line">
            <span class="coin-chip">🪙 偵探幣 <strong id="home-coins">0</strong></span>
            <button id="btn-bestiary" class="text-btn">👾 陷阱怪圖鑑</button>
          </div>
          <div id="home-titles" class="titles"></div>
          <div id="bestiary" class="bestiary hidden"></div>
        </div>

        <div class="setup">
          <label>偵探姓名
            <input id="student-name" maxlength="12" placeholder="輸入姓名或代號">
          </label>

          <fieldset>
            <legend>題目難度</legend>
            <div class="choices three">
              <button class="choice selected" data-diff="mixed"><strong>混合</strong><span>基礎＋標準＋挑戰</span></button>
              <button class="choice" data-diff="basic"><strong>基礎</strong><span>一步任務、單步加減乘除</span></button>
              <button class="choice" data-diff="standard"><strong>標準</strong><span>兩步驟、比較、分配</span></button>
              <button class="choice" data-diff="challenge"><strong>挑戰</strong><span>至少最多、干擾條件</span></button>
            </div>
          </fieldset>

          <fieldset>
            <legend>練習長度</legend>
            <div class="choices three">
              <button class="choice selected" data-count="8"><strong>短篇 8 題</strong><span>考前暖身</span></button>
              <button class="choice" data-count="15"><strong>中篇 15 題</strong><span>完整偵查</span></button>
              <button class="choice" data-count="20"><strong>長篇 20 題</strong><span>深度診斷</span></button>
            </div>
          </fieldset>

          <button id="btn-start" class="primary">開始讀題</button>
          <a class="lobby" href="../hub.html">← 回學習大廳</a>
        </div>
      </div>
    </section>

    <section id="screen-game" class="screen">
      <div class="play-wrap">

        <div id="detective-bar" class="detective-bar">
          <span class="coin-chip">🪙 <strong id="coin-count">0</strong></span>
          <div class="tool-row">
            <button id="use-magnifier" class="tool-btn">🔍 放大鏡 <span id="count-magnifier">0</span></button>
            <button id="use-calmCard" class="tool-btn">🛡️ 冷靜卡 <span id="count-calmCard">0</span></button>
            <button id="use-detectiveNote" class="tool-btn">📜 筆記 <span id="count-detectiveNote">0</span></button>
          </div>
          <button id="btn-shop" class="shop-btn">🛒 商店</button>
        </div>

        <div id="shop-modal" class="shop-modal hidden">
          <h3>🛒 偵探道具商店</h3>
          <p id="shop-event" class="muted"></p>
          <div id="shop-list" class="shop-list"></div>
          <p id="shop-msg" class="shop-msg"></p>
          <button id="btn-shop-close" class="secondary">關閉商店</button>
        </div>

        <article class="card">
          <p id="q-meta" class="meta"></p>
          <h2 id="q-text"></h2>

          <div id="betting-zone" class="betting-zone">
            <p class="bet-lead">🎯 這一題你有多少把握？</p>
            <div class="bet-choices">
              <button class="bet selected" data-bet="steady"><strong>穩健調查</strong><span>答對正常得幣／答錯 −3</span></button>
              <button class="bet" data-bet="gamble"><strong>孤注一擲</strong><span>答對加倍／答錯 −8</span></button>
              <button class="bet" data-bet="insurance"><strong>購買保險</strong><span>先付 5／答錯不扣</span></button>
            </div>
          </div>

          <div id="options" class="options"></div>
          <div id="monster-alert" class="monster-alert hidden"></div>
          <div id="feedback" class="feedback hidden">
            <strong id="fb-title"></strong>
            <p id="fb-message"></p>
            <p id="fb-explain"></p>
            <p id="fb-coins" class="fb-coins"></p>
          </div>
          <button id="btn-next" class="primary hidden">下一題</button>
        </article>
      </div>
    </section>

    <section id="screen-result" class="screen">
      <div class="result-wrap">
        <article class="card report">
          <p class="eyebrow">審題偵查報告</p>
          <h2 id="r-name"></h2>
          <p id="r-context" class="muted"></p>
          <div class="score"><strong id="r-score">0%</strong><span id="r-count"></span></div>

          <h3>各類能力表現</h3>
          <div id="r-skills"></div>

          <h3>最常掉進的審題陷阱</h3>
          <div id="r-traps"></div>

          <div id="r-revenge" class="revenge hidden"></div>

          <h3>下一步建議</h3>
          <p id="r-next"></p>

          <div class="result-actions">
            <button id="btn-export" class="primary">匯出結果</button>
            <button id="btn-again" class="secondary">再練一次</button>
            <a href="../hub.html" class="secondary link-btn">回學習大廳</a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="questions.js"></script>
  <script src="detective-system.js"></script>
  <script src="script.js"></script>
</body>
</html>
